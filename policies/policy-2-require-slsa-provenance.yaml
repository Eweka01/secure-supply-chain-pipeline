apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-slsa-provenance
  annotations:
    policies.kyverno.io/title: Require SLSA Provenance
    policies.kyverno.io/description: >-
      Blocks any pod whose image does not have a valid SLSA provenance attestation.
      Provenance must be signed by the official SLSA GitHub Generator, confirming
      the image was built by the trusted CI pipeline and not tampered with.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: check-slsa-provenance
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [supply-chain]
      verifyImages:
        - imageReferences:
            - "120430500058.dkr.ecr.us-east-1.amazonaws.com/supply-chain-app*"
          attestations:
            - type: https://slsa.dev/provenance/v1
              attestors:
                - entries:
                    - keyless:
                        subject: "https://github.com/slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@refs/tags/v2.1.0"
                        issuer: "https://token.actions.githubusercontent.com"
                        rekor:
                          url: https://rekor.sigstore.dev

name: CI

# Triggers on push to main and on pull requests targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: supply-chain-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # Required for keyless Cosign signing via OIDC

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # AWS_REGION is a variable (not a secret) — it is not sensitive.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Tags with short Git SHA for traceability — never :latest.
      # Captures the image digest after push (sha256:...) — signing is done by
      # digest, not tag, because digests are immutable and content-addressable.
      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA::7}"
          IMAGE_TAG="${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}"

          docker build \
            --build-arg BUILD_COMMIT="${SHORT_SHA}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -f docker/Dockerfile \
            -t "${IMAGE_TAG}" \
            .

          docker push "${IMAGE_TAG}"

          # Capture the full image reference with digest for signing
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE_TAG}")

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST=${IMAGE_DIGEST}" >> "$GITHUB_ENV"
          echo "Image pushed: ${IMAGE_TAG}"
          echo "Digest: ${IMAGE_DIGEST}"

      # Installs the Cosign CLI for keyless signing.
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Signs the image by digest using keyless mode.
      # GitHub's OIDC token proves the signer identity (repo + workflow).
      # The signature is stored in ECR alongside the image — no key management needed.
      - name: Sign container image
        run: cosign sign --yes ${{ env.IMAGE_DIGEST }}

      # Verifies the signature immediately after signing.
      # Checks three things: image was signed, cert was issued by GitHub Actions OIDC,
      # and the signing workflow came from this repository.
      - name: Verify signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "https://github.com/Eweka01/.*" \
            ${{ env.IMAGE_DIGEST }}

      # Scans the image and produces a CycloneDX SBOM — every OS and Python package inside the container.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_TAG }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      # Policy gate — fails the pipeline if any Critical CVE is found.
      - name: Scan SBOM for vulnerabilities
        run: grype sbom:sbom.cyclonedx.json --fail-on critical

      # Permanently associates the SBOM with this build run.
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cyclonedx.json
          retention-days: 90

name: CI

# Triggers on push to main and on pull requests targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: supply-chain-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # AWS_REGION is a variable (not a secret) — it is not sensitive.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Tags with short Git SHA for traceability — never :latest.
      # IMAGE_TAG written to GITHUB_ENV so subsequent steps can use it.
      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA::7}"
          IMAGE_TAG="${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}"

          docker build \
            --build-arg BUILD_COMMIT="${SHORT_SHA}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -f docker/Dockerfile \
            -t "${IMAGE_TAG}" \
            .

          docker push "${IMAGE_TAG}"

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "Image pushed: ${IMAGE_TAG}"

      # Scans the image and produces a CycloneDX SBOM — every OS and Python package inside the container.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_TAG }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      # Policy gate — fails the pipeline if any Critical CVE is found.
      - name: Scan SBOM for vulnerabilities
        run: grype sbom:sbom.cyclonedx.json --fail-on critical

      # Permanently associates the SBOM with this build run.
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cyclonedx.json
          retention-days: 90

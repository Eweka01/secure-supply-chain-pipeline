name: CI

# Triggers on push to main and on pull requests targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: supply-chain-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # Required for keyless Cosign signing via OIDC

    # Expose image name and digest so the provenance job can consume them.
    outputs:
      image: ${{ steps.build.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # AWS_REGION is a variable (not a secret) — it is not sensitive.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Tags with short Git SHA for traceability — never :latest.
      # Writes image and digest to GITHUB_OUTPUT for the provenance job,
      # and to GITHUB_ENV for steps within this job.
      - name: Build and push Docker image
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA::7}"
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          IMAGE_TAG="${IMAGE}:${SHORT_SHA}"

          docker build \
            --build-arg BUILD_COMMIT="${SHORT_SHA}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -f docker/Dockerfile \
            -t "${IMAGE_TAG}" \
            .

          docker push "${IMAGE_TAG}"

          # Extract digest (sha256:...) from the full RepoDigest reference
          FULL_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE_TAG}")
          DIGEST="${FULL_DIGEST##*@}"

          # GITHUB_OUTPUT — shared with the provenance job
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

          # GITHUB_ENV — used by steps in this job
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST=${IMAGE}@${DIGEST}" >> "$GITHUB_ENV"

          echo "Image pushed: ${IMAGE_TAG}"
          echo "Digest: ${DIGEST}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Signs the image by digest — digests are immutable, tags are not.
      - name: Sign container image
        run: cosign sign --yes ${{ env.IMAGE_DIGEST }}

      # Verifies the signature: signed, by GitHub Actions OIDC, from this repo.
      - name: Verify signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "https://github.com/Eweka01/.*" \
            ${{ env.IMAGE_DIGEST }}

      # Scans the image and produces a CycloneDX SBOM — every OS and Python package inside the container.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_TAG }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      # Policy gate — fails the pipeline if any Critical CVE is found.
      - name: Scan SBOM for vulnerabilities
        run: grype sbom:sbom.cyclonedx.json --fail-on critical

      # Attaches the SBOM to the image in ECR as a signed Cosign attestation.
      # Predicate type "cyclonedx" maps to https://cyclonedx.org/bom — what
      # policy-3-block-critical-cves.yaml checks at admission time.
      - name: Attest SBOM to image
        run: |
          cosign attest --yes \
            --predicate sbom.cyclonedx.json \
            --type cyclonedx \
            ${{ env.IMAGE_DIGEST }}

      # Permanently associates the SBOM with this build run.
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cyclonedx.json
          retention-days: 90

      # Uploads SBOM to S3 keyed by image digest — enables the vulnerability
      # correlation engine to query which images contain a given package or CVE.
      - name: Upload SBOM to S3
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          aws s3 cp sbom.cyclonedx.json \
            s3://supply-chain-sboms-120430500058/sboms/${IMAGE_NAME}/${DIGEST#sha256:}/sbom.cyclonedx.json

  # Separate job so provenance is generated by a trusted third-party workflow,
  # not your own pipeline. This is what qualifies as SLSA Level 2.
  provenance:
    needs: build-and-push
    permissions:
      actions: read        # To read the workflow run
      id-token: write      # To sign the provenance with OIDC
      packages: write      # To push the attestation to the registry
    # Calls the official SLSA container generator reusable workflow.
    # It generates an in-toto attestation, signs it, and attaches it to the image in ECR.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.build-and-push.outputs.image }}
      digest: ${{ needs.build-and-push.outputs.digest }}
    secrets:
      # For ECR: username = AWS, password = ECR login token.
      # Add REGISTRY_USERNAME (value: AWS) and REGISTRY_PASSWORD
      # (value: output of `aws ecr get-login-password`) as GitHub Secrets.
      registry-username: ${{ secrets.REGISTRY_USERNAME }}
      registry-password: ${{ secrets.REGISTRY_PASSWORD }}

  # Runs after provenance is attached — downloads and prints the attestation
  # JSON and verifies it, so the proof document is visible in the workflow logs.
  verify-provenance:
    needs: [build-and-push, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Downloads and pretty-prints the provenance attestation JSON.
      # Shows builder ID, source repo, commit SHA, and build parameters —
      # the core proof document of the supply chain.
      - name: Display provenance attestation
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          DIGEST: ${{ needs.build-and-push.outputs.digest }}
        run: |
          echo "====== PROVENANCE ATTESTATION ======"
          cosign download attestation "${IMAGE}@${DIGEST}" \
            | jq -r '.payload' \
            | base64 -d \
            | jq .

      # Verifies the attestation was signed by the SLSA framework workflow,
      # not by this pipeline — confirming SLSA Level 2.
      - name: Verify provenance attestation
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          DIGEST: ${{ needs.build-and-push.outputs.digest }}
        run: |
          echo "====== COSIGN VERIFY-ATTESTATION ======"
          cosign verify-attestation \
            --type slsaprovenance \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "https://github.com/slsa-framework/.*" \
            "${IMAGE}@${DIGEST}" \
            | jq -r '.payload' \
            | base64 -d \
            | jq .
